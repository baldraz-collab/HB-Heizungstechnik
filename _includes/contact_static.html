<!-- Contact Section -->
<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Kontakt</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
<form action="https://formcarry.com/s/6rOhqjXKugz" method="POST" name="sentMessage" id="contactForm" novalidate>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="name">Name</label>
              <input type="text" name="name" class="form-control" placeholder="Name" id="name" required
                data-validation-required-message="Please enter your name.">
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="email">Email Address</label>
              <input type="email" name="_replyto" class="form-control" placeholder="Email Address" id="email" required
                data-validation-required-message="Please enter your email address.">
              <p class="help-block text-danger"></p>
            </div>
          </div>
          
          <div class="row">
            <div class="form-group col-xs-12" style="padding-top: 15px;">
              <button type="submit" class="btn btn-success btn-lg">Senden</button>
            </div>
          </div>
        </form>

        <div id="formSuccessMessage" style="display: none; text-align: center; padding: 30px 10px;">
          <h3 style="color: #2c3e50; font-size: 2em;">
            <i class="fa fa-check-circle" style="color: #B22222; margin-bottom: 10px;"></i><br>
            Vielen Dank!
          </h3>
          <p style="font-size: 1.2em; color: #7f8c8d;">
            Ihre Nachricht wurde erfolgreich versendet.<br>Wir melden uns in Kürze bei Ihnen.
          </p>
        </div>

        <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
          e.preventDefault();
          
          var form = this;
          var formData = new FormData(form);
          var xhr = new XMLHttpRequest();
          
          xhr.open('POST', form.action, true);
          xhr.setRequestHeader('Accept', 'application/json');
          
          xhr.onreadystatechange = function() {
            if (xhr.readyState === XMLHttpRequest.DONE) {
              if (xhr.status === 200) {
                // Versteckt das Formular
                form.style.display = 'none';
                // Zeigt die Erfolgsmeldung an
                document.getElementById('formSuccessMessage').style.display = 'block';
              } else {
                alert('Hoppla! Da ist ein Fehler aufgetreten. Bitte versuchen Sie es erneut.');
              }
            }
          };
          
          xhr.send(formData);
        });
        </script>
            <input type="hidden" name="_subject" value="New submission!">
            <input type="text" name="_gotcha" style="display:none" />
          </div>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="message">Message</label>
              <textarea rows="5" name="message" class="form-control" placeholder="Message" id="message" required
                data-validation-required-message="Please enter a message."></textarea>
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <br>
          <div id="success"></div>
          <div class="row">
            <div class="form-group col-xs-12">
              <button type="submit" class="btn btn-success btn-lg">Send</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
